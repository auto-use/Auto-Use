<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Auto Use — Pair</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 380px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 32px 24px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }
  .logo {
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
    color: #fff;
  }
  .subtitle {
    text-align: center;
    font-size: 13px;
    color: rgba(255,255,255,0.45);
    margin-bottom: 28px;
  }
  .step {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 20px;
  }
  .step-num {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: rgba(120,100,180,0.3);
    color: rgba(255,255,255,0.9);
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .step-text {
    font-size: 14px;
    line-height: 1.5;
    color: rgba(255,255,255,0.75);
  }
  .step-text a {
    color: #7b9dec;
    text-decoration: none;
    font-weight: 600;
  }
  .step-text a:active { opacity: 0.7; }
  .token-input {
    width: 100%;
    height: 46px;
    padding: 0 14px;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    background: rgba(255,255,255,0.08);
    font-family: monospace;
    font-size: 13px;
    color: #fff;
    outline: none;
    margin-bottom: 14px;
    transition: border-color 0.2s;
  }
  .token-input:focus {
    border-color: rgba(120,100,180,0.6);
  }
  .token-input::placeholder { color: rgba(255,255,255,0.25); }
  .connect-btn {
    width: 100%;
    height: 46px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, rgba(120,100,180,0.85), rgba(150,120,200,0.85));
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
  }
  .connect-btn:active { transform: scale(0.97); }
  .connect-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .status {
    text-align: center;
    margin-top: 16px;
    font-size: 13px;
    min-height: 20px;
  }
  .status.error { color: #e57373; }
  .status.success { color: #81c784; }
  .done-card {
    display: none;
    text-align: center;
  }
  .done-card .check {
    font-size: 48px;
    margin-bottom: 12px;
  }
  .done-card .done-title {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 6px;
  }
  .done-card .done-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 20px;
  }
  .open-bot-btn {
    display: inline-block;
    padding: 12px 28px;
    border-radius: 12px;
    background: linear-gradient(135deg, rgba(120,100,180,0.85), rgba(150,120,200,0.85));
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    text-decoration: none;
  }
  .open-bot-btn:active { opacity: 0.7; }
</style>
</head>
<body>

<div class="card" id="setupCard">
  <div class="logo">Auto Use</div>
  <div class="subtitle">Connect Telegram for remote control</div>

  <div class="step">
    <div class="step-num">1</div>
    <div class="step-text">Open <a href="https://t.me/BotFather" target="_blank">@BotFather</a> and send <b>/newbot</b></div>
  </div>
  <div class="step">
    <div class="step-num">2</div>
    <div class="step-text">Name it <b>Auto Use</b> and pick any username</div>
  </div>
  <div class="step">
    <div class="step-num">3</div>
    <div class="step-text">Paste the token below</div>
  </div>

  <input type="text" class="token-input" id="tokenInput" placeholder="Paste bot token here..." autocomplete="off" />
  <button class="connect-btn" id="connectBtn">Connect</button>
  <div class="status" id="statusMsg"></div>
</div>

<div class="card done-card" id="doneCard">
  <div class="check">✅</div>
  <div class="done-title">Connected!</div>
  <div class="done-sub">Send tasks from Telegram to control your PC</div>
  <a class="open-bot-btn" id="openBotLink" href="#" target="_blank">Open Bot</a>
</div>

<script>
  const tokenInput = document.getElementById('tokenInput');
  const connectBtn = document.getElementById('connectBtn');
  const statusMsg = document.getElementById('statusMsg');
  const setupCard = document.getElementById('setupCard');
  const doneCard = document.getElementById('doneCard');
  const openBotLink = document.getElementById('openBotLink');

  connectBtn.addEventListener('click', async () => {
    const token = tokenInput.value.trim();
    if (!token) {
      statusMsg.textContent = 'Please paste a token first';
      statusMsg.className = 'status error';
      return;
    }
    connectBtn.disabled = true;
    statusMsg.textContent = 'Connecting...';
    statusMsg.className = 'status';

    try {
      const res = await fetch('/api/telegram/save-token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token })
      });
      const data = await res.json();
      if (res.ok && data.bot_username) {
        setupCard.style.display = 'none';
        doneCard.style.display = 'block';
        openBotLink.href = 'https://t.me/' + data.bot_username;
      } else {
        statusMsg.textContent = data.error || 'Connection failed';
        statusMsg.className = 'status error';
        connectBtn.disabled = false;
      }
    } catch (e) {
      statusMsg.textContent = 'Network error — are you on the same WiFi?';
      statusMsg.className = 'status error';
      connectBtn.disabled = false;
    }
  });
</script>
</body>
</html>
