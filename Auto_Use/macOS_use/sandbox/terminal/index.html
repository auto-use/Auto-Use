<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mascot - Dynamic Swarm</title>
    <link rel="stylesheet" href="style.css">
    <!-- Three.js for Globe Animation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <!-- Animated Gradient Border Frame -->
    <div class="gradient-border-frame"></div>
    <div class="gradient-border-sides"></div>

    <div class="main-layout">
        <!-- AI Head Section - Fixed at top -->
        <div class="ai-head-section">
          <!-- Globe Container for Web Search Animation -->
          <div id="globeContainer" class="globe-container"></div>
          
          <div class="container-ai-input">
                <div class="area"></div><div class="area"></div><div class="area"></div><div class="area"></div><div class="area"></div>
                <div class="area"></div><div class="area"></div><div class="area"></div><div class="area"></div><div class="area"></div>
                <div class="area"></div><div class="area"></div><div class="area"></div><div class="area"></div><div class="area"></div>
                
                <div class="container-wrap" id="aiHead">
                  <div class="card">
                    <div class="background-blur-balls">
                      <div class="container-loader">
                        <!-- Exact same colors as frontend/index.html -->
                        <article style="--color: #ff8270; --i: 8px; --d: 3.4s" class="ball"></article>
                        <article style="--color: #33d9dc; --i: 12px; --d: 6.1s" class="ball"></article>
                        <article style="--color: #c1ff5c; --i: 6px; --d: 2.9s" class="ball"></article>
                        <article style="--color: #a88ee3; --i: 10px; --d: 7.8s" class="ball"></article>
                        <article style="--color: #ff47a8; --i: 9px; --d: 4.6s" class="ball"></article>
                        <article style="--color: #33ccff; --i: 7px; --d: 3.3s" class="ball"></article>
                        <article style="--color: #99ff33; --i: 11px; --d: 5.5s" class="ball"></article>
                        <article style="--color: #e64565; --i: 8px; --d: 6.7s" class="ball"></article>
                        <article style="--color: #a050e8; --i: 12px; --d: 8.2s" class="ball"></article>
                        <article style="--color: #66dbd6; --i: 10px; --d: 9.1s" class="ball"></article>
                        <article style="--color: #ff6633; --i: 9px; --d: 4.2s" class="ball"></article>
                        <article style="--color: #33ff99; --i: 10px; --d: 5.8s" class="ball"></article>
                        <article style="--color: #c76edb; --i: 6px; --d: 7.3s" class="ball"></article>
                        <article style="--color: #4da3ff; --i: 12px; --d: 6.4s" class="ball"></article>
                        <article style="--color: #ffb833; --i: 13px; --d: 10s" class="ball"></article>
                        <article style="--color: #ff85c2; --i: 8px; --d: 3.7s" class="ball"></article>
                        <article style="--color: #33fcae; --i: 7px; --d: 2.6s" class="ball"></article>
                        <article style="--color: #a833db; --i: 11px; --d: 6.9s" class="ball"></article>
                        <article style="--color: #ffc8d2; --i: 8px; --d: 5.3s" class="ball"></article>
                        <article style="--color: #4cc4bd; --i: 12px; --d: 7.7s" class="ball"></article>
                      </div>
                    </div>
                    
                    <div class="content-card">
                      <div class="background-blur-card">
                        <div class="eyes" id="normalEyes">
                          <span class="eye"></span>
                          <span class="eye"></span>
                        </div>
                        <div class="eyes happy" id="happyEyes">
                          <svg fill="none" viewBox="0 0 24 24">
                            <path fill="currentColor" d="M8.28386 16.2843C8.9917 15.7665 9.8765 14.731 12 14.731C14.1235 14.731 15.0083 15.7665 15.7161 16.2843C17.8397 17.8376 18.7542 16.4845 18.9014 15.7665C19.4323 13.1777 17.6627 11.1066 17.3088 10.5888C16.3844 9.23666 14.1235 8 12 8C9.87648 8 7.61556 9.23666 6.69122 10.5888C6.33728 11.1066 4.56771 13.1777 5.09858 15.7665C5.24582 16.4845 6.16034 17.8376 8.28386 16.2843Z"></path>
                          </svg>
                          <svg fill="none" viewBox="0 0 24 24">
                            <path fill="currentColor" d="M8.28386 16.2843C8.9917 15.7665 9.8765 14.731 12 14.731C14.1235 14.731 15.0083 15.7665 15.7161 16.2843C17.8397 17.8376 18.7542 16.4845 18.9014 15.7665C19.4323 13.1777 17.6627 11.1066 17.3088 10.5888C16.3844 9.23666 14.1235 8 12 8C9.87648 8 7.61556 9.23666 6.69122 10.5888C6.33728 11.1066 4.56771 13.1777 5.09858 15.7665C5.24582 16.4845 6.16034 17.8376 8.28386 16.2843Z"></path>
                          </svg>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
            </div>
        </div>

        <!-- Output Stream Section - Scrollable below AI head -->
        <div class="output-section">
            <div id="outputStream" class="output-stream"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
